[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Use Corepack so Netlify installs the exact pnpm from package.json's
  # `packageManager` field (the version verified locally).
  ENABLE_COREPACK = "true"
  # The `littlefoot` git dependency builds itself with `yarn install` during
  # pnpm install. Corepack otherwise refuses to run yarn because the project
  # declares pnpm as its package manager; disabling strict mode allows it.
  COREPACK_ENABLE_STRICT = "0"
