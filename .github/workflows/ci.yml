name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Match the Netlify deploy environment (netlify.toml): Node 22 + Corepack
      # so the pnpm version comes from package.json's `packageManager` field.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
